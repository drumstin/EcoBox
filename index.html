<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>EcoBox</title>
  <link rel="stylesheet" href="style.css?v=cb8b2c8" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar panel pixel-frame">
      <div>
        <p class="eyebrow">64-BIT FROG TERRARIUM</p>
        <h1>EcoBox</h1>
        <p class="subcopy">Build a cozy frog habitat with moss, hides, feeder crickets, and visitor coins.</p>
      </div>
      <div class="topbar-actions">
        <button id="save-button" class="pixel-button secondary save-button" type="button">Save</button>
      </div>
    </header>

    <section class="game-layout">
      <section class="tank-panel panel pixel-frame">
        <div class="tank-header">
          <div>
            <h2>Overhead Habitat</h2>
            <p>Shape a leafy frog enclosure instead of a fish tank.</p>
          </div>
        </div>

        <div class="tank-stage">
          <canvas id="tank-canvas" width="960" height="960" aria-label="EcoBox frog habitat top-down view"></canvas>
          <div class="tank-overlay" id="tank-overlay"></div>
          <div id="tank-live-readout" class="tank-live-readout"></div>
          <div class="tank-fx" id="tank-fx"></div>
        </div>

        <div class="quick-actions">
          <button id="buy-frog-button" class="pixel-button action-frog featured-action"><span class="action-icon action-icon-frog"></span><span class="action-label">Buy Frog</span><span class="action-price" id="buy-frog-price"></span></button>
          <button id="sell-frog-button" class="pixel-button action-sellfrog"><span class="action-icon action-icon-coin"></span><span class="action-label">Sell 5 Frogs</span><span class="action-price" id="sell-frog-price"></span></button>
          <button id="feed-button" class="pixel-button action-feed"><span class="action-icon action-icon-cricket"></span><span class="action-label">Drop Crickets</span><span class="action-price" id="feed-price"></span></button>
          <button id="buy-pillbug-button" class="pixel-button action-pillbug"><span class="action-icon action-icon-pillbug"></span><span class="action-label">Add Pill Bug</span><span class="action-price" id="buy-pillbug-price"></span></button>
          <button id="clean-button" class="pixel-button action-clean"><span class="action-icon action-icon-clean"></span><span class="action-label">Clean Habitat</span><span class="action-price" id="clean-price"></span></button>
          <button id="boost-button" class="pixel-button action-boost"><span class="action-icon action-icon-lamp"></span><span class="action-label">Sun Lamp</span><span class="action-price" id="boost-price"></span></button>
        </div>

        <div class="multi-buy-bar">
          <span class="multi-buy-label">Multi-buy</span>
          <div class="multi-buy-tabs" id="multi-buy-tabs">
            <button class="multi-buy-tab active" data-multibuy="1" type="button">1</button>
            <button class="multi-buy-tab" data-multibuy="5" type="button">5</button>
            <button class="multi-buy-tab" data-multibuy="10" type="button">10</button>
            <button class="multi-buy-tab" data-multibuy="50" type="button">50</button>
            <button class="multi-buy-tab" data-multibuy="100" type="button">100</button>
          </div>
          <button id="toggle-farm-button" class="farm-toggle-button" type="button">Open Cricket Farm</button>
        </div>

        <section id="cricket-farm-panel" class="farm-panel farm-popup" hidden>
          <div class="section-title-row">
            <h2>Cricket Farm</h2>
            <span class="section-tag">BREEDER</span>
          </div>
          <div class="farm-controls">
            <button id="buy-carrot-button" class="pixel-button action-feed" type="button">Buy Carrot<span class="action-price" id="buy-carrot-price"></span></button>
            <button id="buy-potato-button" class="pixel-button action-pillbug" type="button">Buy Potato Slice<span class="action-price" id="buy-potato-price"></span></button>
            <button id="add-cricket-box-button" class="pixel-button action-clean" type="button">Add Box<span class="action-price" id="add-cricket-box-price"></span></button>
          </div>
          <div id="cricket-farm-boxes" class="farm-boxes"></div>
        </section>
      </section>

      <aside class="hud-shell">
        <section class="hud-strip panel pixel-frame">
          <div class="hud-strip-header">
            <span class="hud-label">LIVE READOUT</span>
            <div id="tank-chips" class="chip-row compact"></div>
          </div>
        </section>

        <section class="hud-cards">
          <section class="hud-card panel pixel-frame">
            <div class="section-title-row">
              <h2>Goals</h2>
              <span class="section-tag">TRACKER</span>
            </div>
            <div id="milestones" class="milestones card-stack"></div>
          </section>

          <section class="hud-card panel pixel-frame">
            <div class="section-title-row">
              <h2>Habitat Shop</h2>
              <span class="section-tag">SHOP</span>
            </div>
            <div id="upgrade-list" class="upgrade-list card-stack"></div>
          </section>

          <section class="hud-card panel pixel-frame">
            <div class="section-title-row">
              <h2>Recent Activity</h2>
              <span class="section-tag">LOG</span>
            </div>
            <div id="event-log" class="event-log card-stack"></div>
          </section>
        </section>
      </aside>
    </section>
  </main>

  <script type="module" src="src/main.js?v=cb8b2c8"></script>
</body>
</html>
